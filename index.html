<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Party Attendance</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: url('https://raw.githubusercontent.com/amyekore/staff-party/main/Background%202.png') center center / cover no-repeat fixed;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.15);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 16px;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.28);
      padding: 48px 44px;
      width: 100%;
      max-width: 520px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      width: 160px;
      height: auto;
      margin-bottom: 24px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .header p {
      color: #6b7280;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 26px;
    }

    label.question {
      display: block;
      font-weight: 600;
      color: #111827;
      font-size: 14px;
      margin-bottom: 10px;
      letter-spacing: 0.1px;
    }

    .options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .options input[type="radio"] {
      display: none;
    }

    .options label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 500;
      color: #374151;
      transition: all 0.15s ease;
      user-select: none;
      background: #f9fafb;
    }

    .options label:hover {
      border-color: #4f46e5;
      color: #4f46e5;
      background: #eef2ff;
    }

    .options input[type="radio"]:checked + label {
      border-color: #4f46e5;
      background: #4f46e5;
      color: #ffffff;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      flex-shrink: 0;
    }

    textarea {
      width: 100%;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      padding: 11px 13px;
      font-size: 13.5px;
      font-family: inherit;
      color: #111827;
      resize: vertical;
      min-height: 96px;
      transition: border-color 0.15s ease;
      background: #f9fafb;
    }

    textarea:focus {
      outline: none;
      border-color: #4f46e5;
      background: #ffffff;
    }

    textarea::placeholder {
      color: #9ca3af;
    }

    .name-input {
      width: 100%;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      padding: 11px 13px;
      font-size: 13.5px;
      font-family: inherit;
      color: #111827;
      transition: border-color 0.15s ease;
      background: #f9fafb;
    }

    .name-input:focus {
      outline: none;
      border-color: #4f46e5;
      background: #ffffff;
    }

    .name-input::placeholder {
      color: #9ca3af;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 28px 0;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #4f46e5;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      letter-spacing: 0.2px;
    }

    button[type="submit"]:hover:not(:disabled) {
      background: #4338ca;
    }

    button[type="submit"]:active:not(:disabled) {
      transform: scale(0.98);
    }

    button[type="submit"]:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .error-msg {
      font-size: 12.5px;
      color: #dc2626;
      margin-top: 7px;
      display: none;
    }

    /* Success state */
    .success {
      display: none;
      text-align: center;
      padding: 16px 0 8px;
    }

    .success-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
    }

    .success-icon svg {
      width: 100%;
      height: 100%;
    }

    .success h2 {
      font-size: 21px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }

    .success p {
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <img src="https://raw.githubusercontent.com/amyekore/staff-party/main/logo-colour.png" alt="Logo" class="logo">
      <h1>Staff Party Attendance</h1>
      <p>Let us know if you can make it!</p>
    </div>

    <form id="attendanceForm" action="https://formspree.io/f/mrerlyvp" method="POST" novalidate>

      <div class="form-group">
        <label class="question" for="name">Your Name</label>
        <input class="name-input" type="text" id="name" name="name" placeholder="Enter your full name">
        <div class="error-msg" id="nameError">Please enter your name.</div>
      </div>

      <hr class="divider">

      <div class="form-group">
        <label class="question">Can you attend Office Drinks?</label>
        <div class="options">
          <input type="radio" name="officeDrinks" id="od-yes" value="yes">
          <label for="od-yes"><span class="dot"></span> Yes</label>

          <input type="radio" name="officeDrinks" id="od-no" value="no">
          <label for="od-no"><span class="dot"></span> No</label>
        </div>
        <div class="error-msg" id="officeDrinksError">Please select an option.</div>
      </div>

      <div class="form-group">
        <label class="question">Can you attend Drinks at 5pm?</label>
        <div class="options">
          <input type="radio" name="drinks5pm" id="d5-yes" value="yes">
          <label for="d5-yes"><span class="dot"></span> Yes</label>

          <input type="radio" name="drinks5pm" id="d5-no" value="no">
          <label for="d5-no"><span class="dot"></span> No</label>

          <input type="radio" name="drinks5pm" id="d5-notsure" value="not sure yet">
          <label for="d5-notsure"><span class="dot"></span> Not sure yet</label>
        </div>
        <div class="error-msg" id="drinks5pmError">Please select an option.</div>
      </div>

      <div class="form-group">
        <label class="question" for="dietary">Dietary Requirements</label>
        <textarea id="dietary" name="dietary" placeholder="Let us know of any dietary requirements..."></textarea>
      </div>

      <div class="form-group">
        <label class="question" for="comments">Any comments? <span id="commentsRequired" style="color:#dc2626;display:none;">*</span></label>
        <textarea id="comments" name="comments" placeholder="Queries or anything else..."></textarea>
        <div class="error-msg" id="commentsError">Please add a comment explaining your answer.</div>
      </div>

      <button type="submit">Submit</button>

    </form>

    <div class="success" id="successMsg">
      <img src="https://raw.githubusercontent.com/amyekore/staff-party/main/logo-colour.png" alt="Logo" class="logo" style="margin-bottom: 28px;">
      <div class="success-icon">
        <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="35" stroke="#16a34a" stroke-width="2" fill="#f0fdf4"/>
          <path d="M20 36.5L30.5 47L52 26" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Thanks for responding!</h2>
      <p>Your attendance has been recorded.<br>See you there!</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('attendanceForm');

    function updateCommentsIndicator() {
      const od = form.querySelector('input[name="officeDrinks"]:checked');
      const d5 = form.querySelector('input[name="drinks5pm"]:checked');
      const needed =
        (od && od.value === 'no') ||
        (d5 && (d5.value === 'no' || d5.value === 'not sure yet'));
      document.getElementById('commentsRequired').style.display = needed ? 'inline' : 'none';
    }

    form.querySelectorAll('input[type="radio"]').forEach(r =>
      r.addEventListener('change', updateCommentsIndicator)
    );

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      let valid = true;

      const name = document.getElementById('name').value.trim();
      const nameError = document.getElementById('nameError');
      if (!name) {
        nameError.style.display = 'block';
        valid = false;
      } else {
        nameError.style.display = 'none';
      }

      const officeDrinks = form.querySelector('input[name="officeDrinks"]:checked');
      const officeDrinksError = document.getElementById('officeDrinksError');
      if (!officeDrinks) {
        officeDrinksError.style.display = 'block';
        valid = false;
      } else {
        officeDrinksError.style.display = 'none';
      }

      const drinks5pm = form.querySelector('input[name="drinks5pm"]:checked');
      const drinks5pmError = document.getElementById('drinks5pmError');
      if (!drinks5pm) {
        drinks5pmError.style.display = 'block';
        valid = false;
      } else {
        drinks5pmError.style.display = 'none';
      }

      // Comments required if any answer is "no" or "not sure yet"
      const commentsRequired =
        (officeDrinks && (officeDrinks.value === 'no')) ||
        (drinks5pm && (drinks5pm.value === 'no' || drinks5pm.value === 'not sure yet'));
      const comments = document.getElementById('comments').value.trim();
      const commentsError = document.getElementById('commentsError');
      if (commentsRequired && !comments) {
        commentsError.style.display = 'block';
        valid = false;
      } else {
        commentsError.style.display = 'none';
      }

      if (!valid) return;

      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        form.style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } else {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
        alert('Something went wrong. Please try again.');
      }
    });
  </script>

</body>
</html>
